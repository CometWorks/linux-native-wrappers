name: Build

# Builds the Linux native wrapper shared libraries and publishes them as a
# tar.gz release asset. These PE-loader shims let the original Windows
# Space Engineers native DLLs run on Linux; both Pulsar for Linux and Magnetar
# consume the resulting archive.
#
#   * push to main        -> build, then publish a PUBLIC release tagged
#                            v1.0.<run_number> and marked "latest". Both
#                            tar.gz assets are attached.
#   * push to a (non-draft)
#     pull request         -> build, then publish a DRAFT release (not public,
#                            not "latest", no git tag is created until/unless a
#                            maintainer publishes it). Same assets otherwise.
#   * draft pull requests  -> skipped entirely (no build, no release).
#
# Two configurations are built and published as separate assets:
#
#   * Release (-O3 -DNDEBUG) -> linux-native-wrappers.tar.gz       (primary)
#   * Debug   (-O0 -g)       -> linux-native-wrappers.debug.tar.gz
#
# Both are attached to the same release; consumers (Pulsar for Linux, Magnetar)
# pull the release asset by name, so the Release archive keeps the historical
# filename and the Debug archive gets the `.debug` variant name.
#
# The build toolchain (ubuntu 24.04 + build-essential/cmake/make/g++) is
# identical to the Docker-based build that Magnetar currently uses, so the
# binaries are interchangeable.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  build:
    # Build on pushes to main and on non-draft PR pushes; never on draft PRs.
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    # Pin to 24.04 to match Magnetar's ubuntu:24.04 wrapper build image.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake make g++

      - name: Build and package native wrappers (Release + Debug)
        run: |
          set -euo pipefail
          mkdir -p dist
          # Pulsar for Linux needs all four wrappers (Magnetar uses only three).
          libs="libD3DCompiler.so libHavok.so libRecastDetour.so libVRageNative.so"
          # Build each configuration into its own tree and archive the four
          # .so files at the root of a tarball. Release keeps the historical
          # asset name; Debug gets the `.debug` variant name.
          build_config() {
            local build_type="$1" archive="$2"
            local build_dir="build-${build_type,,}"
            echo "::group::Build ${build_type}"
            cmake -S . -B "$build_dir" -G "Unix Makefiles" \
              -DCMAKE_BUILD_TYPE="$build_type"
            cmake --build "$build_dir" -j "$(nproc)"
            ctest --test-dir "$build_dir" --output-on-failure
            echo "::endgroup::"
            local out="out-${build_type,,}"
            mkdir -p "$out"
            for lib in $libs; do
              if [ ! -f "$build_dir/$lib" ]; then
                echo "ERROR: expected build output $build_dir/$lib is missing." >&2
                exit 1
              fi
              install -m 0755 "$build_dir/$lib" "$out/$lib"
            done
            tar -czf "dist/$archive" -C "$out" $libs
            echo "Packaged $archive (${build_type}):"
            tar -tzf "dist/$archive"
            ls -l "$out"/*.so
          }
          build_config Release linux-native-wrappers.tar.gz
          build_config Debug   linux-native-wrappers.debug.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-native-wrappers
          path: |
            dist/linux-native-wrappers.tar.gz
            dist/linux-native-wrappers.debug.tar.gz
          if-no-files-found: error

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          assets=(
            "dist/linux-native-wrappers.tar.gz"
            "dist/linux-native-wrappers.debug.tar.gz"
          )

          if [ "${{ github.event_name }}" = "push" ]; then
            # Push to main -> public, tagged, latest.
            tag="v1.0.${{ github.run_number }}"
            gh release create "$tag" \
              --repo "${{ github.repository }}" \
              --latest \
              --target "${{ github.sha }}" \
              --title "Linux Native Wrappers $tag" \
              --notes "Automated build of the Linux native wrapper libraries from commit ${{ github.sha }}." \
              "${assets[@]}"
          else
            # Non-draft PR -> draft release: not public, not latest, and no git
            # tag is created until a maintainer publishes it. One draft is kept
            # per PR (a stable pr-<n> tag), refreshed on every push.
            tag="pr-${{ github.event.pull_request.number }}"
            gh release delete "$tag" \
              --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true
            gh release create "$tag" \
              --repo "${{ github.repository }}" \
              --draft \
              --title "Linux Native Wrappers (PR #${{ github.event.pull_request.number }})" \
              --notes "Draft build for PR #${{ github.event.pull_request.number }} (commit ${{ github.event.pull_request.head.sha }})." \
              "${assets[@]}"
          fi
